<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Edge Picker — Campus Navigator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #1a1a2e; color: #eee; display: flex; flex-direction: column; height: 100vh; }

    #toolbar {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; background: #16213e; border-bottom: 1px solid #0f3460;
      flex-shrink: 0; flex-wrap: wrap;
    }
    #toolbar h1 { font-size: 1rem; color: #e94560; margin-right: 8px; }
    #toolbar label { font-size: 0.85rem; color: #aaa; }
    #toolbar input[type=file] { font-size: 0.8rem; }
    #toolbar input[type=text] { padding: 4px 8px; border-radius: 4px; border: 1px solid #0f3460; background: #0f3460; color: #eee; font-size: 0.85rem; width: 200px; }
    button { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    #btn-load { background: #0f3460; color: #eee; }
    #btn-save { background: #e94560; color: #fff; }
    #btn-save:disabled { background: #555; cursor: default; }
    #status { font-size: 0.8rem; color: #aaa; margin-left: auto; }

    #main { display: flex; flex: 1; overflow: hidden; position: relative; }

    #canvas-wrap {
      position: relative; flex: 1; overflow: auto; background: #111;
      cursor: crosshair;
    }
    #floorplan { display: block; }
    #overlay { position: absolute; top: 0; left: 0; pointer-events: none; }

    #sidebar {
      width: 280px; flex-shrink: 0; background: #16213e;
      border-left: 1px solid #0f3460; overflow-y: auto; padding: 10px;
      display: flex; flex-direction: column; gap: 0;
    }
    #sidebar h2 { font-size: 0.9rem; color: #e94560; margin-bottom: 8px; }
    .sidebar-divider { border: none; border-top: 1px solid #0f3460; margin: 10px 0; }

    .node-item {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 6px; border-radius: 4px; margin-bottom: 4px;
      background: #0f3460; font-size: 0.8rem; cursor: pointer;
    }
    .node-item:hover { background: #1a4a80; }
    .node-item.selected { background: #e94560; }
    .node-item .type-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .node-item .node-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .edge-item {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 6px; border-radius: 4px; margin-bottom: 4px;
      background: #0f3460; font-size: 0.8rem;
    }
    .edge-item:hover { background: #1a4a80; }
    .edge-item .edge-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .edge-item .edge-weight { font-size: 0.7rem; color: #aaa; white-space: nowrap; }
    .edge-item .btn-del {
      background: #e94560; color: #fff; border: none; border-radius: 3px;
      padding: 1px 6px; cursor: pointer; font-size: 0.75rem; flex-shrink: 0;
    }
    .edge-item .btn-del:hover { background: #c73652; }

    #hint-bar {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: #fff; padding: 8px 18px;
      border-radius: 20px; font-size: 0.8rem; pointer-events: none;
      display: none;
    }

    #unplaced-warning {
      background: #7a3c00; color: #ffd580; font-size: 0.8rem;
      padding: 7px 14px; text-align: center; flex-shrink: 0;
      border-bottom: 1px solid #a05000; display: none;
    }

    .node-item.unplaced { opacity: 0.5; }
    .node-item .unplaced-tag {
      font-size: 0.65rem; color: #ffaa00; margin-left: 2px; flex-shrink: 0;
    }

    /* Inline confirm dialog */
    #edge-confirm {
      position: absolute; z-index: 20;
      bottom: 60px; left: 50%; transform: translateX(-50%);
      background: #16213e; border: 1px solid #0f3460; border-radius: 8px;
      padding: 14px 18px; min-width: 280px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      display: none;
    }
    #edge-confirm h3 { font-size: 0.9rem; color: #e94560; margin-bottom: 10px; }
    #edge-confirm .confirm-label { font-size: 0.85rem; margin-bottom: 10px; color: #eee; }
    #edge-confirm .weight-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    #edge-confirm .weight-row label { font-size: 0.8rem; color: #aaa; }
    #edge-confirm input[type=number] {
      width: 80px; padding: 4px 8px; border-radius: 4px;
      border: 1px solid #0f3460; background: #0f3460; color: #eee; font-size: 0.85rem;
    }
    #edge-confirm .confirm-btns { display: flex; gap: 8px; }
    #btn-confirm-edge { background: #4caf50; color: #fff; }
    #btn-cancel-edge { background: #555; color: #eee; }
  </style>
</head>
<body>

<div id="toolbar">
  <h1>Edge Picker</h1>

  <label>Floor plan:
    <input type="file" id="img-input" accept="image/*" />
  </label>

  <label>nodes.json:
    <input type="file" id="nodes-input" accept=".json" />
  </label>

  <label>edges.json (opt):
    <input type="file" id="edges-input" accept=".json" />
  </label>

  <label>Filter building:
    <input type="text" id="filter-building" placeholder="e.g. NPB (blank = all)" />
  </label>

  <button id="btn-load">Load</button>
  <button id="btn-save" disabled>Save edges.json</button>

  <span id="status">No files loaded.</span>
</div>

<div id="unplaced-warning">
  ⚠ Most nodes have no coordinates yet. Use <strong>coord_picker.html</strong> first to place them on the map, then reload nodes.json here.
</div>

<div id="main">
  <div id="canvas-wrap">
    <img id="floorplan" src="" alt="" />
    <canvas id="overlay"></canvas>
  </div>

  <div id="sidebar">
    <h2>Nodes <span id="node-count"></span></h2>
    <div id="node-list"></div>

    <hr class="sidebar-divider" />

    <h2>Edges <span id="edge-count"></span></h2>
    <div id="edge-list"></div>
  </div>

  <!-- Inline confirm dialog lives inside #main so it scrolls with it -->
  <div id="edge-confirm">
    <h3>Add Connection</h3>
    <div class="confirm-label" id="confirm-label">Node A ↔ Node B</div>
    <div class="weight-row">
      <label>Distance (weight):</label>
      <input type="number" id="edge-weight" min="1" step="1" value="10" />
    </div>
    <div class="confirm-btns">
      <button id="btn-confirm-edge">Add Edge</button>
      <button id="btn-cancel-edge">Cancel</button>
    </div>
  </div>
</div>

<div id="hint-bar">Select a node to start an edge.</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let nodes = [];
  let edges = [];
  let nodesById = {};
  let edgeSet = new Set();   // canonical keys "srcId|tgtId" for both directions

  let imgLoaded = false;
  let mousePos = { x: 0, y: 0 };   // natural-pixel coords under cursor
  let hoverNodeIndex = null;
  let hoveredEdgePair = null;        // canonical pair key for sidebar hover highlight
  let nodeA = null;
  let nodeB = null;
  let mode = 'IDLE';                 // 'IDLE' | 'SELECTING_B' | 'CONFIRMING'
  let activeFilter = '';

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const imgEl       = document.getElementById('floorplan');
  const canvas      = document.getElementById('overlay');
  const ctx         = canvas.getContext('2d');
  const canvasWrap  = document.getElementById('canvas-wrap');
  const nodeListEl  = document.getElementById('node-list');
  const nodeCount   = document.getElementById('node-count');
  const edgeListEl  = document.getElementById('edge-list');
  const edgeCount   = document.getElementById('edge-count');
  const statusEl    = document.getElementById('status');
  const hintBar     = document.getElementById('hint-bar');
  const filterInput = document.getElementById('filter-building');
  const btnSave     = document.getElementById('btn-save');
  const confirmDialog = document.getElementById('edge-confirm');
  const confirmLabel  = document.getElementById('confirm-label');
  const weightInput   = document.getElementById('edge-weight');

  // ── Type colors ────────────────────────────────────────────────────────────
  const TYPE_COLOR = {
    room:       '#4caf50',
    elevator:   '#1a9bd6',
    staircase:  '#f4a261',
    waypoint:   '#a8dadc',
  };
  function nodeColor(node) {
    return TYPE_COLOR[node.type] || '#a8dadc';
  }

  // ── File: floor plan image ─────────────────────────────────────────────────
  document.getElementById('img-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    imgEl.onload = () => {
      canvas.width  = imgEl.naturalWidth;
      canvas.height = imgEl.naturalHeight;
      canvas.style.width  = imgEl.offsetWidth  + 'px';
      canvas.style.height = imgEl.offsetHeight + 'px';
      imgLoaded = true;
      redraw();
      setStatus(`Image: ${imgEl.naturalWidth}×${imgEl.naturalHeight}px`);
    };
    imgEl.src = url;
  });

  new ResizeObserver(() => {
    if (imgLoaded) {
      canvas.style.width  = imgEl.offsetWidth  + 'px';
      canvas.style.height = imgEl.offsetHeight + 'px';
    }
  }).observe(imgEl);

  const warningBanner = document.getElementById('unplaced-warning');

  // ── File: nodes.json ───────────────────────────────────────────────────────
  document.getElementById('nodes-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        nodes = JSON.parse(ev.target.result);
        nodesById = {};
        nodes.forEach(n => nodesById[n.id] = n);
        renderNodeList();
        redraw();
        btnSave.disabled = false;
        hintBar.style.display = 'block';
        // Warn if most nodes are unplaced
        const placed = nodes.filter(n => n.coords && (n.coords[0] !== 0 || n.coords[1] !== 0)).length;
        if (placed === 0) {
          warningBanner.style.display = 'block';
          setStatus(`Loaded ${nodes.length} nodes — none have coordinates yet. Use coord_picker.html first!`);
        } else {
          warningBanner.style.display = 'none';
          setStatus(`Loaded ${nodes.length} nodes (${placed} placed, ${nodes.length - placed} unplaced).`);
        }
      } catch {
        alert('Failed to parse nodes.json');
      }
    };
    reader.readAsText(file);
  });

  // ── File: edges.json (optional) ───────────────────────────────────────────
  document.getElementById('edges-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const loaded = JSON.parse(ev.target.result);
        edges = Array.isArray(loaded) ? loaded : [];
        rebuildEdgeSet();
        renderEdgeList();
        redraw();
        setStatus(`Loaded ${edges.length} directed edges (${uniquePairCount()} connections).`);
      } catch {
        alert('Failed to parse edges.json');
      }
    };
    reader.readAsText(file);
  });

  // ── Filter / Load button ───────────────────────────────────────────────────
  document.getElementById('btn-load').addEventListener('click', applyFilter);
  filterInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') applyFilter(); });

  function applyFilter() {
    activeFilter = filterInput.value.trim().toLowerCase();
    renderNodeList();
    renderEdgeList();
    redraw();
  }

  // ── Canvas: mousemove ──────────────────────────────────────────────────────
  canvasWrap.addEventListener('mousemove', (e) => {
    if (!imgLoaded) return;
    const { x, y } = clientToNatural(e.clientX, e.clientY);
    mousePos = { x, y };
    const idx = findNodeNear(x, y);
    if (idx !== hoverNodeIndex) {
      hoverNodeIndex = idx;
      redraw();
    } else if (mode === 'SELECTING_B') {
      redraw();   // keep ghost line updating
    }
  });

  // ── Canvas: click ──────────────────────────────────────────────────────────
  canvasWrap.addEventListener('click', (e) => {
    if (!imgLoaded || mode === 'CONFIRMING') return;
    const { x, y } = clientToNatural(e.clientX, e.clientY);
    const idx = findNodeNear(x, y);
    if (idx === null) return;

    if (mode === 'IDLE') {
      nodeA = nodes[idx];
      mode = 'SELECTING_B';
      setHint(`"${nodeA.name || nodeA.id}" selected — now click the second node. (Esc to cancel)`);
      renderNodeList();
      redraw();
    } else if (mode === 'SELECTING_B') {
      const candidate = nodes[idx];
      if (candidate.id === nodeA.id) return;   // same node, ignore
      nodeB = candidate;
      openConfirmDialog();
    }
  });

  // ── Keyboard: Escape ───────────────────────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (mode === 'SELECTING_B' || mode === 'CONFIRMING') {
        resetMode();
      }
    }
    if (e.key === 'Enter' && mode === 'CONFIRMING') {
      confirmEdge();
    }
  });

  // ── Confirm dialog ─────────────────────────────────────────────────────────
  function openConfirmDialog() {
    mode = 'CONFIRMING';
    const nameA = nodeA.name || nodeA.id;
    const nameB = nodeB.name || nodeB.id;
    confirmLabel.textContent = `${nameA} ↔ ${nameB}`;

    // Pre-fill weight from Euclidean pixel distance if both are placed
    const [ax, ay] = nodeA.coords || [0, 0];
    const [bx, by] = nodeB.coords || [0, 0];
    if ((ax !== 0 || ay !== 0) && (bx !== 0 || by !== 0)) {
      weightInput.value = Math.max(1, Math.round(Math.hypot(bx - ax, by - ay)));
    } else {
      weightInput.value = 10;
    }

    confirmDialog.style.display = 'block';
    weightInput.focus();
    weightInput.select();
    setHint('Confirm or cancel the new connection.');
  }

  document.getElementById('btn-confirm-edge').addEventListener('click', confirmEdge);
  document.getElementById('btn-cancel-edge').addEventListener('click', resetMode);

  function confirmEdge() {
    const w = Math.max(1, parseInt(weightInput.value, 10) || 10);
    const key = `${nodeA.id}|${nodeB.id}`;

    if (edgeSet.has(key)) {
      setStatus('Edge already exists — skipped.');
      resetMode();
      return;
    }

    edges.push({ source: nodeA.id, target: nodeB.id, weight: w, instruction: makeInstruction(nodeA, nodeB) });
    edges.push({ source: nodeB.id, target: nodeA.id, weight: w, instruction: makeInstruction(nodeB, nodeA) });
    edgeSet.add(`${nodeA.id}|${nodeB.id}`);
    edgeSet.add(`${nodeB.id}|${nodeA.id}`);

    setStatus(`Added: ${nodeA.name || nodeA.id} ↔ ${nodeB.name || nodeB.id} (w=${w})`);
    renderEdgeList();
    redraw();
    resetMode();
  }

  function resetMode() {
    mode = 'IDLE';
    nodeA = null;
    nodeB = null;
    confirmDialog.style.display = 'none';
    setHint('Select a node to start an edge.');
    renderNodeList();
    redraw();
  }

  // ── makeInstruction — mirrors edge_generator.py exactly ───────────────────
  function makeInstruction(fromNode, toNode) {
    const fromName = fromNode.name || fromNode.id;
    const toName   = toNode.name   || toNode.id;
    if (fromNode.type === 'room') return `Exit room ${fromName} and continue.`;
    if (toNode.type   === 'room') return `Enter room ${toName}.`;
    return `Continue toward ${toName}.`;
  }

  // ── Edge set helpers ───────────────────────────────────────────────────────
  function rebuildEdgeSet() {
    edgeSet = new Set(edges.map(e => `${e.source}|${e.target}`));
  }

  function uniquePairCount() {
    const seen = new Set();
    edges.forEach(e => {
      const k = [e.source, e.target].sort().join('|');
      seen.add(k);
    });
    return seen.size;
  }

  function deleteEdgePair(srcId, tgtId) {
    edges = edges.filter(e =>
      !((e.source === srcId && e.target === tgtId) ||
        (e.source === tgtId && e.target === srcId))
    );
    edgeSet.delete(`${srcId}|${tgtId}`);
    edgeSet.delete(`${tgtId}|${srcId}`);
    renderEdgeList();
    redraw();
    setStatus(`Deleted: ${srcId} ↔ ${tgtId}`);
  }

  // ── renderNodeList ─────────────────────────────────────────────────────────
  function renderNodeList() {
    nodeListEl.innerHTML = '';
    let shown = 0;
    nodes.forEach((node, i) => {
      if (activeFilter && (node.building || '').toLowerCase() !== activeFilter) return;
      const div = document.createElement('div');
      const isSelected = nodeA && node.id === nodeA.id;
      div.className = 'node-item' + (isSelected ? ' selected' : '');

      const isPlaced = node.coords && (node.coords[0] !== 0 || node.coords[1] !== 0);
      if (!isPlaced) div.classList.add('unplaced');

      const dot = document.createElement('span');
      dot.className = 'type-dot';
      dot.style.background = isSelected ? '#fff' : nodeColor(node);

      const label = document.createElement('span');
      label.className = 'node-label';
      label.title = node.id;
      label.textContent = node.name || node.id;

      div.appendChild(dot);
      div.appendChild(label);

      if (!isPlaced) {
        const tag = document.createElement('span');
        tag.className = 'unplaced-tag';
        tag.textContent = '?';
        tag.title = 'No coordinates — place this node in coord_picker.html first';
        div.appendChild(tag);
      }

      div.addEventListener('click', () => {
        if (mode === 'CONFIRMING') return;
        if (mode === 'IDLE') {
          nodeA = node;
          mode = 'SELECTING_B';
          setHint(`"${nodeA.name || nodeA.id}" selected — now click the second node. (Esc to cancel)`);
          renderNodeList();
          redraw();
          scrollToNode(i);
        } else if (mode === 'SELECTING_B') {
          if (node.id === nodeA.id) return;
          nodeB = node;
          openConfirmDialog();
        }
      });

      nodeListEl.appendChild(div);
      shown++;
    });
    nodeCount.textContent = `(${shown}/${nodes.length})`;
  }

  function scrollToNode(index) {
    if (!imgLoaded) return;
    const node = nodes[index];
    if (!node.coords) return;
    const [px, py] = node.coords;
    const scaleX = imgEl.offsetWidth  / imgEl.naturalWidth;
    const scaleY = imgEl.offsetHeight / imgEl.naturalHeight;
    canvasWrap.scrollTo({
      left: px * scaleX - canvasWrap.clientWidth  / 2,
      top:  py * scaleY - canvasWrap.clientHeight / 2,
      behavior: 'smooth',
    });
  }

  // ── renderEdgeList ─────────────────────────────────────────────────────────
  function renderEdgeList() {
    edgeListEl.innerHTML = '';
    // Build deduplicated undirected pairs
    const seen = new Map();   // canonical key → {srcId, tgtId, weight}
    edges.forEach(e => {
      const [a, b] = [e.source, e.target].sort();
      const k = `${a}|${b}`;
      if (!seen.has(k)) seen.set(k, { srcId: e.source, tgtId: e.target, weight: e.weight });
    });

    let count = 0;
    seen.forEach(({ srcId, tgtId, weight }, pairKey) => {
      // Apply building filter: skip pair if either node doesn't match
      if (activeFilter) {
        const nA = nodesById[srcId];
        const nB = nodesById[tgtId];
        if (!nA || (nA.building || '').toLowerCase() !== activeFilter) return;
        if (!nB || (nB.building || '').toLowerCase() !== activeFilter) return;
      }

      const nameA = (nodesById[srcId]  || {}).name || srcId;
      const nameB = (nodesById[tgtId]  || {}).name || tgtId;

      const div = document.createElement('div');
      div.className = 'edge-item';

      const labelSpan = document.createElement('span');
      labelSpan.className = 'edge-label';
      labelSpan.title = `${srcId} ↔ ${tgtId}`;
      labelSpan.textContent = `${nameA} ↔ ${nameB}`;

      const weightSpan = document.createElement('span');
      weightSpan.className = 'edge-weight';
      weightSpan.textContent = `w:${weight}`;

      const delBtn = document.createElement('button');
      delBtn.className = 'btn-del';
      delBtn.textContent = '×';
      delBtn.title = 'Delete this connection';
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteEdgePair(srcId, tgtId);
      });

      // Highlight corresponding edge on canvas when hovering the row
      div.addEventListener('mouseenter', () => {
        hoveredEdgePair = pairKey;
        redraw();
      });
      div.addEventListener('mouseleave', () => {
        hoveredEdgePair = null;
        redraw();
      });

      div.appendChild(labelSpan);
      div.appendChild(weightSpan);
      div.appendChild(delBtn);
      edgeListEl.appendChild(div);
      count++;
    });

    edgeCount.textContent = `(${count})`;
  }

  // ── redraw ─────────────────────────────────────────────────────────────────
  function redraw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.setLineDash([]);

    // 1. Draw normal edges
    edges.forEach(e => {
      const nA = nodesById[e.source];
      const nB = nodesById[e.target];
      if (!nA || !nB) return;
      if (activeFilter) {
        if ((nA.building || '').toLowerCase() !== activeFilter) return;
        if ((nB.building || '').toLowerCase() !== activeFilter) return;
      }
      const [ax, ay] = nA.coords || [0, 0];
      const [bx, by] = nB.coords || [0, 0];
      const canonKey = [e.source, e.target].sort().join('|');
      if (canonKey === hoveredEdgePair) return;  // draw highlighted version later

      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(bx, by);
      ctx.strokeStyle = 'rgba(100, 180, 255, 0.45)';
      ctx.lineWidth = 2;
      ctx.stroke();
    });

    // 2. Draw highlighted (hovered) edge on top
    if (hoveredEdgePair) {
      const [idA, idB] = hoveredEdgePair.split('|');
      const nA = nodesById[idA];
      const nB = nodesById[idB];
      if (nA && nB) {
        const [ax, ay] = nA.coords || [0, 0];
        const [bx, by] = nB.coords || [0, 0];
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(bx, by);
        ctx.strokeStyle = 'rgba(255, 200, 80, 0.9)';
        ctx.lineWidth = 3;
        ctx.stroke();
      }
    }

    // 3. Ghost line from nodeA to cursor (SELECTING_B mode)
    if (mode === 'SELECTING_B' && nodeA) {
      const [ax, ay] = nodeA.coords || [0, 0];
      if (ax !== 0 || ay !== 0) {
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(mousePos.x, mousePos.y);
        ctx.strokeStyle = 'rgba(233, 69, 96, 0.65)';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([6, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    // 4. Draw nodes
    nodes.forEach((node, i) => {
      if (activeFilter && (node.building || '').toLowerCase() !== activeFilter) return;
      const [x, y] = node.coords || [0, 0];
      const isNodeA   = nodeA && node.id === nodeA.id;
      const isHovered = i === hoverNodeIndex;

      let fill   = nodeColor(node);
      let radius = 7;
      if (isNodeA)   { fill = '#e94560'; radius = 10; }
      else if (isHovered) { fill = '#ffe066'; radius = 9; }

      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fillStyle = fill;
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Label
      const label = node.name || node.id;
      ctx.font = `${isNodeA ? 'bold ' : ''}12px sans-serif`;
      ctx.strokeStyle = 'rgba(0,0,0,0.6)';
      ctx.lineWidth = 3;
      ctx.strokeText(label, x + 12, y + 4);
      ctx.fillStyle = '#fff';
      ctx.fillText(label, x + 12, y + 4);
    });
  }

  // ── Coordinate helpers ─────────────────────────────────────────────────────
  function clientToNatural(clientX, clientY) {
    const rect   = imgEl.getBoundingClientRect();
    const scaleX = imgEl.naturalWidth  / imgEl.offsetWidth;
    const scaleY = imgEl.naturalHeight / imgEl.offsetHeight;
    return {
      x: (clientX - rect.left) * scaleX,
      y: (clientY - rect.top)  * scaleY,
    };
  }

  function findNodeNear(nx, ny) {
    const HIT = 14;   // natural pixels
    for (let i = nodes.length - 1; i >= 0; i--) {
      if (activeFilter && (nodes[i].building || '').toLowerCase() !== activeFilter) continue;
      const [cx, cy] = nodes[i].coords || [0, 0];
      if (Math.hypot(nx - cx, ny - cy) <= HIT) return i;
    }
    return null;
  }

  // ── Save edges.json ────────────────────────────────────────────────────────
  btnSave.addEventListener('click', async () => {
    const json = JSON.stringify(edges, null, 2);
    if (window.showSaveFilePicker) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: 'edges.json',
          types: [{ description: 'JSON file', accept: { 'application/json': ['.json'] } }],
        });
        const writable = await handle.createWritable();
        await writable.write(json);
        await writable.close();
        setStatus(`Saved to ${handle.name} (${edges.length} directed edges).`);
      } catch (err) {
        if (err.name !== 'AbortError') setStatus('Save failed: ' + err.message);
      }
    } else {
      // Fallback for Firefox
      const blob = new Blob([json], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'edges.json';
      a.click();
      setStatus(`edges.json downloaded (${edges.length} directed edges).`);
    }
  });

  // ── UI helpers ─────────────────────────────────────────────────────────────
  function setStatus(msg) { statusEl.textContent = msg; }
  function setHint(msg)   { hintBar.textContent = msg; hintBar.style.display = 'block'; }
</script>
</body>
</html>

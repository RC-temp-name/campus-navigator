<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Edge Picker — Campus Navigator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #1a1a2e; color: #eee; display: flex; flex-direction: column; height: 100vh; }

    #toolbar {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; background: #16213e; border-bottom: 1px solid #0f3460;
      flex-shrink: 0; flex-wrap: wrap;
    }
    #toolbar h1 { font-size: 1rem; color: #e94560; margin-right: 8px; }
    #toolbar label { font-size: 0.85rem; color: #aaa; }
    #toolbar input[type=file] { font-size: 0.8rem; }
    #toolbar input[type=text], #toolbar input[type=number] {
      padding: 4px 8px; border-radius: 4px; border: 1px solid #0f3460;
      background: #0f3460; color: #eee; font-size: 0.85rem;
    }
    #filter-building { width: 70px; }
    #filter-floor { width: 45px; }
    button { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    #btn-load { background: #0f3460; color: #eee; }
    #btn-save { background: #e94560; color: #fff; }
    #btn-save:disabled { background: #555; cursor: default; }
    #status { font-size: 0.8rem; color: #aaa; margin-left: auto; }

    #main { display: flex; flex: 1; overflow: hidden; position: relative; }

    #canvas-wrap {
      position: relative; flex: 1; overflow: hidden; background: #111;
      cursor: crosshair;
    }
    #floorplan { position: absolute; top: 0; left: 0; display: none; opacity: 0.35; pointer-events: none; }
    #overlay { display: block; width: 100%; height: 100%; }

    #sidebar {
      width: 280px; flex-shrink: 0; background: #16213e;
      border-left: 1px solid #0f3460; overflow-y: auto; padding: 10px;
      display: flex; flex-direction: column; gap: 0;
    }
    #sidebar h2 { font-size: 0.9rem; color: #e94560; margin-bottom: 8px; }
    .sidebar-divider { border: none; border-top: 1px solid #0f3460; margin: 10px 0; }

    .node-item {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 6px; border-radius: 4px; margin-bottom: 4px;
      background: #0f3460; font-size: 0.8rem; cursor: pointer;
    }
    .node-item:hover { background: #1a4a80; }
    .node-item.selected { background: #e94560; }
    .node-item .type-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .node-item .node-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .edge-item {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 6px; border-radius: 4px; margin-bottom: 4px;
      background: #0f3460; font-size: 0.8rem;
    }
    .edge-item:hover { background: #1a4a80; }
    .edge-item .edge-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .edge-item .edge-weight { font-size: 0.7rem; color: #aaa; white-space: nowrap; }
    .edge-item .btn-del {
      background: #e94560; color: #fff; border: none; border-radius: 3px;
      padding: 1px 6px; cursor: pointer; font-size: 0.75rem; flex-shrink: 0;
    }
    .edge-item .btn-del:hover { background: #c73652; }

    #hint-bar {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: #fff; padding: 8px 18px;
      border-radius: 20px; font-size: 0.8rem; pointer-events: none;
      display: none;
    }

    #unplaced-warning {
      background: #7a3c00; color: #ffd580; font-size: 0.8rem;
      padding: 7px 14px; text-align: center; flex-shrink: 0;
      border-bottom: 1px solid #a05000; display: none;
    }

    .node-item.unplaced { opacity: 0.5; }
    .node-item .unplaced-tag {
      font-size: 0.65rem; color: #ffaa00; margin-left: 2px; flex-shrink: 0;
    }

    #edge-confirm {
      position: absolute; z-index: 20;
      bottom: 60px; left: 50%; transform: translateX(-50%);
      background: #16213e; border: 1px solid #0f3460; border-radius: 8px;
      padding: 14px 18px; min-width: 280px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      display: none;
    }
    #edge-confirm h3 { font-size: 0.9rem; color: #e94560; margin-bottom: 10px; }
    #edge-confirm .confirm-label { font-size: 0.85rem; margin-bottom: 10px; color: #eee; }
    #edge-confirm .weight-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    #edge-confirm .weight-row label { font-size: 0.8rem; color: #aaa; }
    #edge-confirm input[type=number] {
      width: 80px; padding: 4px 8px; border-radius: 4px;
      border: 1px solid #0f3460; background: #0f3460; color: #eee; font-size: 0.85rem;
    }
    #edge-confirm .confirm-btns { display: flex; gap: 8px; }
    #btn-confirm-edge { background: #4caf50; color: #fff; }
    #btn-cancel-edge { background: #555; color: #eee; }
  </style>
</head>
<body>

<div id="toolbar">
  <h1>Edge Picker</h1>

  <label>Data folder:
    <input type="file" id="data-dir" webkitdirectory />
  </label>

  <label>Image (opt):
    <input type="file" id="img-input" accept="image/*" />
  </label>

  <label>Building:
    <input type="text" id="filter-building" placeholder="NPB" />
  </label>

  <label>Floor:
    <input type="number" id="filter-floor" placeholder="5" />
  </label>

  <button id="btn-load">Load</button>
  <button id="btn-save" disabled>Save edges.json</button>
  <button id="btn-reset-view">Reset View</button>

  <span id="status">Select the data/ folder to begin.</span>
</div>

<div id="unplaced-warning">
  ⚠ Most nodes have no coordinates yet. Use <strong>coord_picker.html</strong> first to place them on the map, then reload nodes.json here.
</div>

<div id="main">
  <div id="canvas-wrap">
    <img id="floorplan" alt="" />
    <canvas id="overlay"></canvas>
  </div>

  <div id="sidebar">
    <h2>Nodes <span id="node-count"></span></h2>
    <div id="node-list"></div>

    <hr class="sidebar-divider" />

    <h2>Edges <span id="edge-count"></span></h2>
    <div id="edge-list"></div>
  </div>

  <div id="edge-confirm">
    <h3>Add Connection</h3>
    <div class="confirm-label" id="confirm-label">Node A ↔ Node B</div>
    <div class="weight-row">
      <label>Distance (ft):</label>
      <input type="number" id="edge-weight" min="1" step="1" value="10" />
    </div>
    <div class="confirm-btns">
      <button id="btn-confirm-edge">Add Edge</button>
      <button id="btn-cancel-edge">Cancel</button>
    </div>
  </div>
</div>

<div id="hint-bar">Select a node to start an edge.</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let nodes = [];
  let edges = [];
  let nodesById = {};
  let edgeSet = new Set();

  let floorsData = null;
  let floorMeta = null;
  let mousePos = { cx: 0, cy: 0 };   // canvas-pixel coords under cursor
  let hoverNodeIndex = null;
  let hoveredEdgePair = null;
  let nodeA = null;
  let nodeB = null;
  let mode = 'IDLE';   // 'IDLE' | 'SELECTING_B' | 'CONFIRMING'
  let activeFilter = '';
  let activeFloor = NaN;

  let zoomLevel = 1;
  let panX = 0;
  let panY = 0;
  let isPanning = false;
  let panStart = { x: 0, y: 0, panX0: 0, panY0: 0 };

  let CANVAS_W = 900;
  let CANVAS_H = 500;

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const imgEl         = document.getElementById('floorplan');
  const canvas        = document.getElementById('overlay');
  const ctx           = canvas.getContext('2d');
  const canvasWrap    = document.getElementById('canvas-wrap');
  const nodeListEl    = document.getElementById('node-list');
  const nodeCountEl   = document.getElementById('node-count');
  const edgeListEl    = document.getElementById('edge-list');
  const edgeCountEl   = document.getElementById('edge-count');
  const statusEl      = document.getElementById('status');
  const hintBar       = document.getElementById('hint-bar');
  const filterBuilding = document.getElementById('filter-building');
  const filterFloor    = document.getElementById('filter-floor');
  const btnSave       = document.getElementById('btn-save');
  const confirmDialog = document.getElementById('edge-confirm');
  const confirmLabel  = document.getElementById('confirm-label');
  const weightInput   = document.getElementById('edge-weight');
  const warningBanner = document.getElementById('unplaced-warning');

  function resizeCanvas() {
    CANVAS_W = canvasWrap.clientWidth;
    CANVAS_H = canvasWrap.clientHeight;
    canvas.width  = CANVAS_W;
    canvas.height = CANVAS_H;
    imgEl.style.width  = CANVAS_W + 'px';
    imgEl.style.height = CANVAS_H + 'px';
    redraw();
  }

  window.addEventListener('resize', resizeCanvas);

  // ── Type colors ────────────────────────────────────────────────────────────
  const TYPE_COLOR = {
    room:      '#4caf50',
    elevator:  '#1a9bd6',
    staircase: '#f4a261',
    waypoint:  '#a8dadc',
    spine:     '#9b8dca',
  };
  function nodeColor(node) { return TYPE_COLOR[node.type] || '#a8dadc'; }

  // ── Coordinate math (feet ↔ canvas pixels) ────────────────────────────────
  function getScale() {
    if (!floorMeta) return 4;
    return Math.min(
      (CANVAS_W * 0.88) / floorMeta.width_feet,
      (CANVAS_H * 0.88) / floorMeta.height_feet
    );
  }

  function feetToCanvas(fx, fy) {
    const s = getScale() * zoomLevel;
    return [CANVAS_W / 2 + fx * s + panX, CANVAS_H / 2 - fy * s + panY];
  }

  function canvasToFeet(cx, cy) {
    const s = getScale() * zoomLevel;
    return [
      Math.round((cx - CANVAS_W / 2 - panX) / s * 10) / 10,
      Math.round(-(cy - CANVAS_H / 2 - panY) / s * 10) / 10
    ];
  }

  function isPlaced(node) {
    return node.coords !== null &&
           Array.isArray(node.coords) &&
           node.coords[0] !== null &&
           node.coords[1] !== null;
  }

  // ── File loaders ──────────────────────────────────────────────────────────

  document.getElementById('data-dir').addEventListener('change', (e) => {
    const files = Array.from(e.target.files);
    const floorsFile = files.find(f => f.name === 'floors.json');
    const nodesFile  = files.find(f => f.name === 'nodes.json');
    const edgesFile  = files.find(f => f.name === 'edges.json');
    if (!floorsFile) { setStatus('No floors.json found in selected folder.'); return; }
    if (!nodesFile)  { setStatus('No nodes.json found in selected folder.');  return; }

    let pending = 2;
    function onCoreLoaded() {
      if (--pending > 0) return;
      nodesById = {};
      nodes.forEach(n => nodesById[n.id] = n);
      btnSave.disabled = false;
      hintBar.style.display = 'block';
      tryUpdateFloorMeta();
      renderNodeList();
      renderEdgeList();
      redraw();
      const placed = nodes.filter(n => isPlaced(n)).length;
      if (placed === 0) {
        warningBanner.style.display = 'block';
        setStatus(`Loaded ${nodes.length} nodes — none placed yet. Use coord_picker.html first!`);
      } else {
        warningBanner.style.display = 'none';
        setStatus(`Loaded ${nodes.length} nodes (${placed} placed) + ${edges.length} directed edges from data/.`);
      }
    }
    readJSON(floorsFile, (data) => { floorsData = data;                       onCoreLoaded(); });
    readJSON(nodesFile,  (data) => { nodes = data;                            onCoreLoaded(); });
    if (edgesFile) readJSON(edgesFile, (data) => {
      edges = Array.isArray(data) ? data : [];
      rebuildEdgeSet();
    });
  });

  document.getElementById('img-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    imgEl.onload = () => {
      imgEl.style.display = 'block';
      imgEl.style.width  = CANVAS_W + 'px';
      imgEl.style.height = CANVAS_H + 'px';
      redraw();
      setStatus('Image loaded (visual reference, 35% opacity).');
    };
    imgEl.src = URL.createObjectURL(file);
  });

  function readJSON(file, cb) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      try { cb(JSON.parse(ev.target.result)); }
      catch { alert('Failed to parse ' + file.name); }
    };
    reader.readAsText(file);
  }

  // ── Floor metadata ────────────────────────────────────────────────────────

  document.getElementById('btn-load').addEventListener('click', applyFilter);
  filterBuilding.addEventListener('keydown', (e) => { if (e.key === 'Enter') applyFilter(); });
  filterFloor.addEventListener('keydown',    (e) => { if (e.key === 'Enter') applyFilter(); });

  function applyFilter() {
    activeFilter = filterBuilding.value.trim().toLowerCase();
    activeFloor  = parseInt(filterFloor.value.trim());
    tryUpdateFloorMeta();
    renderNodeList();
    renderEdgeList();
    redraw();
  }

  function tryUpdateFloorMeta() {
    if (!floorsData) return;
    const b = (filterBuilding.value.trim() || 'NPB').toUpperCase();
    const f = filterFloor.value.trim() || '5';
    if (floorsData[b] && floorsData[b][f]) {
      floorMeta = floorsData[b][f];
      redraw();
    }
  }

  // ── Zoom & pan ─────────────────────────────────────────────────────────────
  canvasWrap.addEventListener('wheel', (e) => {
    e.preventDefault();
    const { cx, cy } = clientToCanvas(e.clientX, e.clientY);
    const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    const newZoom = Math.max(0.25, Math.min(12, zoomLevel * factor));
    const ratio = newZoom / zoomLevel;
    panX = panX + (cx - CANVAS_W / 2 - panX) * (1 - ratio);
    panY = panY + (cy - CANVAS_H / 2 - panY) * (1 - ratio);
    zoomLevel = newZoom;
    redraw();
  }, { passive: false });

  canvasWrap.addEventListener('mousedown', (e) => {
    if (e.button === 1) {
      e.preventDefault();
      isPanning = true;
      panStart = { x: e.clientX, y: e.clientY, panX0: panX, panY0: panY };
      canvasWrap.style.cursor = 'grabbing';
    }
  });

  document.addEventListener('mouseup', (e) => {
    if (e.button === 1 && isPanning) {
      isPanning = false;
      canvasWrap.style.cursor = 'crosshair';
    }
  });

  function resetView() {
    zoomLevel = 1;
    panX = 0;
    panY = 0;
    redraw();
  }

  document.getElementById('btn-reset-view').addEventListener('click', resetView);

  // ── Canvas: mousemove ──────────────────────────────────────────────────────
  canvasWrap.addEventListener('mousemove', (e) => {
    if (isPanning) {
      panX = panStart.panX0 + (e.clientX - panStart.x);
      panY = panStart.panY0 + (e.clientY - panStart.y);
      redraw();
      return;
    }
    const { cx, cy } = clientToCanvas(e.clientX, e.clientY);
    mousePos = { cx, cy };
    const idx = findNodeNear(cx, cy);
    if (idx !== hoverNodeIndex) {
      hoverNodeIndex = idx;
      redraw();
    } else if (mode === 'SELECTING_B') {
      redraw();
    }
  });

  // ── Canvas: click ──────────────────────────────────────────────────────────
  canvasWrap.addEventListener('click', (e) => {
    if (mode === 'CONFIRMING') return;
    const { cx, cy } = clientToCanvas(e.clientX, e.clientY);
    const idx = findNodeNear(cx, cy);
    if (idx === null) return;

    if (mode === 'IDLE') {
      nodeA = nodes[idx];
      mode  = 'SELECTING_B';
      setHint(`"${nodeA.name || nodeA.id}" selected — now click the second node. (Esc to cancel)`);
      renderNodeList();
      redraw();
    } else if (mode === 'SELECTING_B') {
      if (nodes[idx].id === nodeA.id) return;
      nodeB = nodes[idx];
      openConfirmDialog();
    }
  });

  // ── Keyboard: Escape / Enter ───────────────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && (mode === 'SELECTING_B' || mode === 'CONFIRMING')) resetMode();
    if (e.key === 'Enter'  && mode === 'CONFIRMING') confirmEdge();
  });

  // ── Confirm dialog ─────────────────────────────────────────────────────────
  function openConfirmDialog() {
    mode = 'CONFIRMING';
    confirmLabel.textContent = `${nodeA.name || nodeA.id} ↔ ${nodeB.name || nodeB.id}`;

    // Pre-fill weight from Euclidean feet distance if both placed
    if (isPlaced(nodeA) && isPlaced(nodeB)) {
      const [ax, ay] = nodeA.coords;
      const [bx, by] = nodeB.coords;
      weightInput.value = Math.max(1, Math.round(Math.hypot(bx - ax, by - ay)));
    } else {
      weightInput.value = 10;
    }

    confirmDialog.style.display = 'block';
    weightInput.focus();
    weightInput.select();
    setHint('Confirm or cancel the new connection.');
  }

  document.getElementById('btn-confirm-edge').addEventListener('click', confirmEdge);
  document.getElementById('btn-cancel-edge').addEventListener('click', resetMode);

  function confirmEdge() {
    const w = Math.max(1, parseInt(weightInput.value, 10) || 10);
    const key = `${nodeA.id}|${nodeB.id}`;
    if (edgeSet.has(key)) {
      setStatus('Edge already exists — skipped.');
      resetMode();
      return;
    }
    edges.push({ source: nodeA.id, target: nodeB.id, weight: w, instruction: makeInstruction(nodeA, nodeB) });
    edges.push({ source: nodeB.id, target: nodeA.id, weight: w, instruction: makeInstruction(nodeB, nodeA) });
    edgeSet.add(`${nodeA.id}|${nodeB.id}`);
    edgeSet.add(`${nodeB.id}|${nodeA.id}`);
    setStatus(`Added: ${nodeA.name || nodeA.id} ↔ ${nodeB.name || nodeB.id} (w=${w})`);
    renderEdgeList();
    redraw();
    resetMode();
  }

  function resetMode() {
    mode  = 'IDLE';
    nodeA = null;
    nodeB = null;
    confirmDialog.style.display = 'none';
    setHint('Select a node to start an edge.');
    renderNodeList();
    redraw();
  }

  // ── makeInstruction ────────────────────────────────────────────────────────
  function makeInstruction(fromNode, toNode) {
    const fromName = fromNode.name || fromNode.id;
    const toName   = toNode.name   || toNode.id;
    if (fromNode.type === 'room') return `Exit room ${fromName} and continue.`;
    if (toNode.type   === 'room') return `Enter room ${toName}.`;
    return `Continue toward ${toName}.`;
  }

  // ── Edge set helpers ───────────────────────────────────────────────────────
  function rebuildEdgeSet() {
    edgeSet = new Set(edges.map(e => `${e.source}|${e.target}`));
  }

  function uniquePairCount() {
    const seen = new Set();
    edges.forEach(e => { seen.add([e.source, e.target].sort().join('|')); });
    return seen.size;
  }

  function deleteEdgePair(srcId, tgtId) {
    edges = edges.filter(e =>
      !((e.source === srcId && e.target === tgtId) ||
        (e.source === tgtId && e.target === srcId))
    );
    edgeSet.delete(`${srcId}|${tgtId}`);
    edgeSet.delete(`${tgtId}|${srcId}`);
    renderEdgeList();
    redraw();
    setStatus(`Deleted: ${srcId} ↔ ${tgtId}`);
  }

  // ── Filter helpers ─────────────────────────────────────────────────────────
  function nodeVisible(node) {
    if (activeFilter && (node.building || '').toLowerCase() !== activeFilter) return false;
    if (!isNaN(activeFloor) && node.floor !== activeFloor) return false;
    return true;
  }

  // ── renderNodeList ─────────────────────────────────────────────────────────
  function renderNodeList() {
    nodeListEl.innerHTML = '';
    let shown = 0;
    nodes.forEach((node, i) => {
      if (!nodeVisible(node)) return;
      const div = document.createElement('div');
      const isSel = nodeA && node.id === nodeA.id;
      div.className = 'node-item' + (isSel ? ' selected' : '');
      if (!isPlaced(node)) div.classList.add('unplaced');

      const dot = document.createElement('span');
      dot.className = 'type-dot';
      dot.style.background = isSel ? '#fff' : nodeColor(node);

      const label = document.createElement('span');
      label.className = 'node-label';
      label.title = node.id;
      label.textContent = node.name || node.id;

      div.appendChild(dot);
      div.appendChild(label);

      if (!isPlaced(node)) {
        const tag = document.createElement('span');
        tag.className = 'unplaced-tag';
        tag.textContent = '?';
        tag.title = 'No coordinates — place this node in coord_picker.html first';
        div.appendChild(tag);
      }

      div.addEventListener('click', () => {
        if (mode === 'CONFIRMING') return;
        if (mode === 'IDLE') {
          nodeA = node;
          mode  = 'SELECTING_B';
          setHint(`"${nodeA.name || nodeA.id}" selected — now click the second node. (Esc to cancel)`);
          renderNodeList();
          redraw();
          scrollToNode(i);
        } else if (mode === 'SELECTING_B') {
          if (node.id === nodeA.id) return;
          nodeB = node;
          openConfirmDialog();
        }
      });

      nodeListEl.appendChild(div);
      shown++;
    });
    nodeCountEl.textContent = `(${shown}/${nodes.length})`;
  }

  function scrollToNode(index) {
    if (!isPlaced(nodes[index])) return;
    const [cx, cy] = feetToCanvas(nodes[index].coords[0], nodes[index].coords[1]);
    const dispScale = canvas.offsetWidth / CANVAS_W;
    canvasWrap.scrollTo({
      left: cx * dispScale - canvasWrap.clientWidth  / 2,
      top:  cy * dispScale - canvasWrap.clientHeight / 2,
      behavior: 'smooth',
    });
  }

  // ── renderEdgeList ─────────────────────────────────────────────────────────
  function renderEdgeList() {
    edgeListEl.innerHTML = '';
    const seen = new Map();
    edges.forEach(e => {
      const [a, b] = [e.source, e.target].sort();
      const k = `${a}|${b}`;
      if (!seen.has(k)) seen.set(k, { srcId: e.source, tgtId: e.target, weight: e.weight });
    });

    let count = 0;
    seen.forEach(({ srcId, tgtId, weight }, pairKey) => {
      if (activeFilter) {
        const nA = nodesById[srcId], nB = nodesById[tgtId];
        if (!nA || (nA.building || '').toLowerCase() !== activeFilter) return;
        if (!nB || (nB.building || '').toLowerCase() !== activeFilter) return;
      }

      const nameA = (nodesById[srcId] || {}).name || srcId;
      const nameB = (nodesById[tgtId] || {}).name || tgtId;

      const div = document.createElement('div');
      div.className = 'edge-item';

      const labelSpan = document.createElement('span');
      labelSpan.className = 'edge-label';
      labelSpan.title = `${srcId} ↔ ${tgtId}`;
      labelSpan.textContent = `${nameA} ↔ ${nameB}`;

      const weightSpan = document.createElement('span');
      weightSpan.className = 'edge-weight';
      weightSpan.textContent = `${weight} ft`;

      const delBtn = document.createElement('button');
      delBtn.className = 'btn-del';
      delBtn.textContent = '×';
      delBtn.title = 'Delete this connection';
      delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteEdgePair(srcId, tgtId); });

      div.addEventListener('mouseenter', () => { hoveredEdgePair = pairKey; redraw(); });
      div.addEventListener('mouseleave', () => { hoveredEdgePair = null;    redraw(); });

      div.appendChild(labelSpan);
      div.appendChild(weightSpan);
      div.appendChild(delBtn);
      edgeListEl.appendChild(div);
      count++;
    });

    edgeCountEl.textContent = `(${count})`;
  }

  // ── redraw ─────────────────────────────────────────────────────────────────
  function redraw() {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.setLineDash([]);

    // Background
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    if (!floorMeta) {
      ctx.fillStyle = '#555';
      ctx.font = '15px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Load floors.json and set Building/Floor, then click Load.', CANVAS_W / 2, CANVAS_H / 2);
      ctx.textAlign = 'left';
      return;
    }

    // Grid lines every 10 ft
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = 1;
    const hw = floorMeta.width_feet  / 2 + 10;
    const hh = floorMeta.height_feet / 2 + 10;
    for (let x = -Math.ceil(hw / 10) * 10; x <= hw; x += 10) {
      const [cx] = feetToCanvas(x, 0);
      ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, CANVAS_H); ctx.stroke();
    }
    for (let y = -Math.ceil(hh / 10) * 10; y <= hh; y += 10) {
      const [, cy] = feetToCanvas(0, y);
      ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(CANVAS_W, cy); ctx.stroke();
    }

    // Floor bounding box
    const [bx1, by1] = feetToCanvas(-floorMeta.width_feet / 2,  floorMeta.height_feet / 2);
    const [bx2, by2] = feetToCanvas( floorMeta.width_feet / 2, -floorMeta.height_feet / 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(bx1, by1, bx2 - bx1, by2 - by1);

    // Origin crosshair
    const [ox, oy] = feetToCanvas(0, 0);
    ctx.strokeStyle = '#e94560';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(ox - 14, oy); ctx.lineTo(ox + 14, oy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ox, oy - 14); ctx.lineTo(ox, oy + 14); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#e94560';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('origin (0, 0)', ox, oy - 18);
    ctx.textAlign = 'left';

    // 1. Normal edges
    edges.forEach(e => {
      const nA = nodesById[e.source], nB = nodesById[e.target];
      if (!nA || !nB || !nodeVisible(nA) || !nodeVisible(nB)) return;
      if (!isPlaced(nA) || !isPlaced(nB)) return;
      const [ax, ay] = feetToCanvas(nA.coords[0], nA.coords[1]);
      const [bx, by] = feetToCanvas(nB.coords[0], nB.coords[1]);
      const canonKey = [e.source, e.target].sort().join('|');
      if (canonKey === hoveredEdgePair) return;

      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(bx, by);
      ctx.strokeStyle = 'rgba(100, 180, 255, 0.45)';
      ctx.lineWidth = 2;
      ctx.stroke();
    });

    // 2. Highlighted (hovered) edge
    if (hoveredEdgePair) {
      const [idA, idB] = hoveredEdgePair.split('|');
      const nA = nodesById[idA], nB = nodesById[idB];
      if (nA && nB && isPlaced(nA) && isPlaced(nB)) {
        const [ax, ay] = feetToCanvas(nA.coords[0], nA.coords[1]);
        const [bx, by] = feetToCanvas(nB.coords[0], nB.coords[1]);
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(bx, by);
        ctx.strokeStyle = 'rgba(255, 200, 80, 0.9)';
        ctx.lineWidth = 3;
        ctx.stroke();
      }
    }

    // 3. Ghost line from nodeA to cursor
    if (mode === 'SELECTING_B' && nodeA && isPlaced(nodeA)) {
      const [ax, ay] = feetToCanvas(nodeA.coords[0], nodeA.coords[1]);
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(mousePos.cx, mousePos.cy);
      ctx.strokeStyle = 'rgba(233, 69, 96, 0.65)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // 4. Nodes
    nodes.forEach((node, i) => {
      if (!nodeVisible(node) || !isPlaced(node)) return;
      const [cx, cy] = feetToCanvas(node.coords[0], node.coords[1]);
      const isNodeA   = nodeA && node.id === nodeA.id;
      const isHovered = i === hoverNodeIndex;

      let fill   = nodeColor(node);
      let radius = 7;
      if (isNodeA)        { fill = '#e94560'; radius = 10; }
      else if (isHovered) { fill = '#ffe066'; radius = 9; }

      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.fillStyle = fill;
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();

      const label = node.name || node.id;
      ctx.font = `${isNodeA ? 'bold ' : ''}12px sans-serif`;
      ctx.strokeStyle = 'rgba(0,0,0,0.6)';
      ctx.lineWidth = 3;
      ctx.strokeText(label, cx + 12, cy + 4);
      ctx.fillStyle = '#fff';
      ctx.fillText(label, cx + 12, cy + 4);
    });
  }

  // ── Coordinate helpers ─────────────────────────────────────────────────────
  function clientToCanvas(clientX, clientY) {
    const rect   = canvas.getBoundingClientRect();
    const scaleX = CANVAS_W / canvas.offsetWidth;
    const scaleY = CANVAS_H / canvas.offsetHeight;
    return {
      cx: (clientX - rect.left) * scaleX,
      cy: (clientY - rect.top)  * scaleY,
    };
  }

  function findNodeNear(cx, cy) {
    const HIT = 14;   // canvas pixels
    for (let i = nodes.length - 1; i >= 0; i--) {
      if (!nodeVisible(nodes[i]) || !isPlaced(nodes[i])) continue;
      const [ncx, ncy] = feetToCanvas(nodes[i].coords[0], nodes[i].coords[1]);
      if (Math.hypot(cx - ncx, cy - ncy) <= HIT) return i;
    }
    return null;
  }

  // ── Save ──────────────────────────────────────────────────────────────────
  btnSave.addEventListener('click', async () => {
    const json = JSON.stringify(edges, null, 2);
    if (window.showSaveFilePicker) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: 'edges.json',
          types: [{ description: 'JSON file', accept: { 'application/json': ['.json'] } }],
        });
        const writable = await handle.createWritable();
        await writable.write(json);
        await writable.close();
        setStatus(`Saved to ${handle.name} (${edges.length} directed edges).`);
      } catch (err) {
        if (err.name !== 'AbortError') setStatus('Save failed: ' + err.message);
      }
    } else {
      const blob = new Blob([json], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'edges.json';
      a.click();
      setStatus(`edges.json downloaded (${edges.length} directed edges).`);
    }
  });

  // ── UI helpers ─────────────────────────────────────────────────────────────
  function setStatus(msg) { statusEl.textContent = msg; }
  function setHint(msg)   { hintBar.textContent = msg; hintBar.style.display = 'block'; }

  resizeCanvas();
</script>
</body>
</html>
